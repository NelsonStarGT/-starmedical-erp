name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck

  prisma-drift:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: starmedical
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d starmedical"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/starmedical?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/starmedical?schema=shadow
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci

      - name: Guard schema change has migration
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qx "prisma/schema.prisma"; then
            if ! echo "$CHANGED" | grep -q "^prisma/migrations/"; then
              echo "::error ::prisma/schema.prisma changed but prisma/migrations/** was not updated."
              exit 1
            fi
          fi

      - name: Prisma validate
        run: npm run db:validate
      - name: Apply migrations (deploy)
        run: npm run db:migrate:deploy
      - name: Migrate status
        run: npm run db:migrate:status
      - name: Drift check (DB vs migrations)
        run: npm run db:migrate:diff

