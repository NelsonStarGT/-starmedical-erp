services:
  db:
    image: postgres:16-alpine
    container_name: starmedical-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: starmedical
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starmedical"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

volumes:
  pgdata:
